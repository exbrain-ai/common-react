    description: Accessibility testing with axe-core for Vitest

  - name: axe-core
    version: "^4.0.0"
    category: Testing & Quality
    description: Accessibility testing engine (peer dependency of vitest-axe)

  # Logging
  - name: pino
    version: "^10.0.0"
    category: Logging
    description: High-performance structured JSON logger for Node.js and browser
    justification: >
      Industry-standard structured logging. Works in Next.js API routes and browser.
      Outputs JSON logs compatible with Loki. Pino v10+ has built-in browser support.

  # Authentication
  - name: "@auth0/auth0-react"
    version: "^2.0.0"
    category: Authentication
    description: Official Auth0 React SDK (wrapped by @exbrain/common-react)

  # State Management — Redux only. Zustand is NOT approved.
  - name: "@reduxjs/toolkit"
