# Approved React Libraries
# This is the source of truth for approved libraries - scripts parse this file
# The markdown file (library-standards.mdc) is documentation that references this
#
# POLICY: Tailwind CSS + shadcn/Radix UI only. No CSS-in-JS (MUI, Emotion, styled-components).
# One state manager: Redux Toolkit. No Zustand.

libraries:
  # Core React & TypeScript
  - name: react
    version: v18.2.0
    category: Core React & TypeScript
    description: React library

  - name: react-dom
    version: v18.2.0
    category: Core React & TypeScript
    description: React DOM rendering

  - name: typescript
    version: v5.9.3
    category: Core React & TypeScript
    description: TypeScript compiler

  - name: "@types/react"
    version: v18.2.0
    category: Core React & TypeScript
    description: React TypeScript definitions

  - name: "@types/react-dom"
    version: v18.2.0
    category: Core React & TypeScript
    description: React DOM TypeScript definitions

  - name: "@types/node"
    version: v20.19.0
    category: Core React & TypeScript
    description: Node.js TypeScript definitions

  # Framework
  - name: next
    version: "^16.0.10"
    category: Framework
    description: Next.js 16 App Router framework
    justification: Core framework for all ExBrain UI apps. Version 16.0.10+ patches CVE-2025-66478.

  # Build Tools & Development
  - name: vitest
    version: v3.2.4
