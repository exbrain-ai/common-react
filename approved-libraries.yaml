    version: "^0.0.0"
    category: Build Tools & Development
    description: OpenAPI client codegen (exbrain-ui)

  # Testing & Quality
  - name: "@testing-library/react"
    version: v16.3.2
    category: Testing & Quality
    description: React testing utilities

  - name: "@testing-library/dom"
    version: v10.4.1
    category: Testing & Quality
    description: DOM testing utilities

  - name: "@testing-library/jest-dom"
    version: v6.8.0
    category: Testing & Quality
    description: Jest DOM matchers

  - name: "@testing-library/user-event"
    version: v13.5.0
    category: Testing & Quality
    description: User interaction testing

  - name: "@types/jest"
    version: v27.5.2
    category: Testing & Quality
