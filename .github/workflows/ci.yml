# CI: golden check, lint, test, build, Semgrep (self-contained; no dependency on common-go).

name: CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'vite.config.*'
      - 'scripts/**'
      - '.semgrep/**'
      - '.github/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'vite.config.*'
      - 'scripts/**'
      - '.semgrep/**'
      - '.github/**'

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            semgrep/semgrep:latest \
            semgrep scan \
              --config p/ci \
              --config .semgrep \
              --error \
              --metrics=off \
              .

  golden-check:
    name: Golden check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Golden check
        run: bash scripts/check-golden.sh

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  all-checks:
    name: All Checks Summary
    runs-on: ubuntu-latest
    needs:
      - semgrep
      - golden-check
      - lint
      - test
      - build
    if: always()
    steps:
      - name: Evaluate results
        run: |
          FAILED=()
          check() { if [ "$1" != "success" ]; then FAILED+=("$2"); fi; }

          check "${{ needs.semgrep.result }}"       "Semgrep SAST"
          check "${{ needs.golden-check.result }}"  "Golden check"
          check "${{ needs.lint.result }}"          "Lint"
          check "${{ needs.test.result }}"          "Test"
          check "${{ needs.build.result }}"         "Build"

          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "❌ Failed checks: ${FAILED[*]}"
            exit 1
          fi

          echo "✅ All required checks passed"
